<!DOCTYPE html>
<html class="dark" lang="vi">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BrotherKanban — Chào mừng đến The Park!</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700;800&family=Epilogue:wght@700;900&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./bk-supabase.js"></script>
  <style>
    body { font-family: 'Space Grotesk', sans-serif; background: #0d0f0c; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .card { background: #1a1a2e; border: 4px solid #ff7294; box-shadow: 8px 8px 0 0 #ff7294; max-width: 500px; width: 100%; padding: 40px; }
    h1 { font-family: 'Epilogue', sans-serif; font-weight: 900; color: #ff7294; font-size: 2rem; line-height: 1; margin-bottom: 8px; }
    .subtitle { color: #aaa; font-size: 13px; margin-bottom: 32px; }
    label { display: block; font-size: 10px; font-weight: 700; letter-spacing: .15em; text-transform: uppercase; color: #888; margin-bottom: 6px; }
    input[type="text"] {
      width: 100%; background: #252535; border: 3px solid #333; color: #f0f0f0;
      padding: 14px 16px; font-size: 16px; font-weight: 700;
      outline: none; transition: border-color .2s;
    }
    input[type="text"]:focus { border-color: #ff7294; }
    .emoji-grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 8px; margin-top: 8px; }
    .emoji-opt {
      width: 100%; aspect-ratio: 1; border: 2px solid #333; background: #252535;
      font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all .15s; user-select: none;
    }
    .emoji-opt:hover { border-color: #ff7294; transform: scale(1.1); }
    .emoji-opt.selected { border-color: #ff7294; background: #3d1a2e; box-shadow: 0 0 0 2px #ff7294; }
    .btn-submit {
      width: 100%; margin-top: 32px; padding: 18px;
      background: #b7004d; border: 3px solid #ff7294;
      color: #fff; font-size: 18px; font-weight: 900;
      letter-spacing: .1em; text-transform: uppercase; cursor: pointer;
      box-shadow: 4px 4px 0 0 #ff7294; transition: all .15s;
    }
    .btn-submit:hover { transform: translate(-2px,-2px); box-shadow: 6px 6px 0 0 #ff7294; }
    .btn-submit:active { transform: translate(2px,2px); box-shadow: 2px 2px 0 0 #ff7294; }
    .btn-submit:disabled { opacity: .5; cursor: default; transform: none; }
    .error-box { background: #3d0a0a; border: 2px solid #f87171; color: #f87171; padding: 12px; font-size: 13px; font-weight: 700; margin-top: 16px; display: none; }
    .info-row { display: flex; align-items: center; gap: 12px; background: #252535; border: 2px solid #333; padding: 12px 16px; margin-bottom: 24px; }
    .info-row .material-symbols-outlined { color: #ff7294; }
    .info-row span { color: #ccc; font-size: 13px; }
    .info-row strong { color: #fff; }
  </style>
</head>
<body>
  <div class="card">
    <!-- Header -->
    <h1>CHÀO RANGER MỚI! 🎉</h1>
    <p class="subtitle">Tài khoản Google của bạn chưa có hồ sơ trong hệ thống. Điền thêm vài thông tin để hoàn tất nhé!</p>

    <!-- Google info preview -->
    <div class="info-row">
      <span class="material-symbols-outlined">account_circle</span>
      <div>
        <div style="font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.1em;">Google Account</div>
        <strong id="preview-email"></strong>
      </div>
    </div>

    <!-- Display Name -->
    <div style="margin-bottom:24px;">
      <label>Tên Hiển Thị (Display Name)</label>
      <input type="text" id="ob-name" placeholder="Ví dụ: Dao Huy" maxlength="30"/>
    </div>

    <!-- Emoji picker -->
    <div style="margin-bottom:8px;">
      <label>Chọn Avatar Emoji</label>
      <div class="emoji-grid" id="emoji-grid">
        <!-- Generated by JS -->
      </div>
      <div style="margin-top:8px;font-size:11px;color:#666;">Đang chọn: <span id="selected-emoji-preview">👤</span></div>
    </div>

    <!-- Role info -->
    <div style="margin-top:24px;background:#1e2a1e;border:2px solid #22c55e;padding:12px;font-size:12px;color:#86efac;">
      <span style="font-weight:700;">ℹ️ Quyền hạn:</span> Tài khoản mới mặc định là <strong>Member</strong>. Manager có thể nâng cấp sau.
    </div>

    <!-- Error -->
    <div class="error-box" id="ob-error"></div>

    <!-- Submit -->
    <button class="btn-submit" id="ob-btn" onclick="doOnboard()">
      VÀO THE PARK! 🚀
    </button>
  </div>

  <script>
  const EMOJIS = ['👤','🦝','🦏','🦉','🐸','🐼','🐨','🦊','🐯','🐻','🐶','🐱','🦁','🐧','🦋','🐳','🌟','⚡','🔥','🎯','🎸','🎮','🏆','💡'];
  let selectedEmoji = '👤';

  // Populate emoji grid
  const grid = document.getElementById('emoji-grid');
  EMOJIS.forEach(e => {
    const btn = document.createElement('button');
    btn.className = 'emoji-opt' + (e === selectedEmoji ? ' selected' : '');
    btn.textContent = e;
    btn.onclick = () => {
      document.querySelectorAll('.emoji-opt').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      selectedEmoji = e;
      document.getElementById('selected-emoji-preview').textContent = e;
    };
    grid.appendChild(btn);
  });

  // Pre-fill from sessionStorage (set by auth-callback.html)
  window.addEventListener('DOMContentLoaded', () => {
    const email = sessionStorage.getItem('bk-onboard-email') || '';
    const name  = sessionStorage.getItem('bk-onboard-name')  || '';
    document.getElementById('preview-email').textContent = email || 'Google Account';
    if (name) document.getElementById('ob-name').value = name;
  });

  async function doOnboard() {
    const displayName = document.getElementById('ob-name').value.trim();
    const uid         = sessionStorage.getItem('bk-onboard-uid');
    const errBox      = document.getElementById('ob-error');
    const btn         = document.getElementById('ob-btn');

    errBox.style.display = 'none';

    if (!displayName) {
      errBox.textContent = '⚠️ Nhập tên hiển thị đi! Benson không gọi bạn là "Unknown" đâu.';
      errBox.style.display = 'block';
      return;
    }
    if (!uid) {
      errBox.textContent = '⚠️ Phiên đăng nhập hết hạn. Về trang đăng nhập và thử lại.';
      errBox.style.display = 'block';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'ĐANG TẠO HỒ SƠ...';

    try {
      // profiles.id = auth UUID (ph\u1ea3i l\u00e0 UUID, kh\u00f4ng ph\u1ea3i text)
      const profile = await BKSupabase.upsertProfile({
        id      : uid,           // ← auth UUID t\u1eeb Supabase
        name    : displayName,
        role    : 'member',
        emoji   : selectedEmoji,
        auth_uid: uid,           // redundant nh\u01b0ng c\u1ea7n thi\u1ebft \u0111\u1ec3 lookup sau n\u00e0y
      });

      // Xóa session storage tạm
      sessionStorage.removeItem('bk-onboard-uid');
      sessionStorage.removeItem('bk-onboard-email');
      sessionStorage.removeItem('bk-onboard-name');

      await BKSupabase.pullToLocal().catch(() => {});

      btn.textContent = `✅ CHÀO MỪNG ${displayName.toUpperCase()}!`;
      setTimeout(() => {
        window.location.href = './brotherkanban_dashboard_creative_night/code.html';
      }, 1000);
    } catch(err) {
      errBox.textContent = '❌ Lỗi: ' + err.message;
      errBox.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'VÀO THE PARK! 🚀';
    }
  }
  </script>
</body>
</html>
